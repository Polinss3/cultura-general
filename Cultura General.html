function OptionBtn({ text, state, onClick, letter }) {
  const base = {
    width: "100%", padding: "14px 16px",
    borderRadius: 14, border: "1.5px solid",
    display: "flex", alignItems: "center", gap: 12,
    cursor: "pointer", transition: "all 0.2s",
    fontFamily: "Outfit", fontSize: 15, fontWeight: 500,
    textAlign: "left", background: "transparent",
    animation: state === 'wrong' ? 'shake 0.4s ease' : undefined,
  };
  const styles = {
    null: { ...base, borderColor: "rgba(255,255,255,0.12)", color: "#fff" },
    selected: { ...base, borderColor: "#fff", color: "#fff", background: "rgba(255,255,255,0.08)" },
    correct: { ...base, borderColor: "#2ec87a", color: "#2ec87a", background: "rgba(46,200,122,0.1)" },
    wrong: { ...base, borderColor: "#e83060", color: "#e83060", background: "rgba(232,48,96,0.1)" },
  };
  return (
    <button style={styles[state || 'null']} onClick={onClick}>
      <span style={{
        width: 26, height: 26, borderRadius: 8, flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 12, fontWeight: 700,
        background: state === 'correct' ? "rgba(46,200,122,0.2)" :
                    state === 'wrong'   ? "rgba(232,48,96,0.2)" :
                    state === 'selected'? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.08)",
        color: state === 'correct' ? "#2ec87a" : state === 'wrong' ? "#e83060" : "rgba(255,255,255,0.6)"
      }}>{letter}</span>
      {text}
    </button>
  );
}

function DailyScreen({ onBack }) {
  const [selected, setSelected] = React.useState(null);

  const [showRanking, setShowRanking] = React.useState(false);

  const handle = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    setTimeout(() => setShowRanking(true), 1200);

  const getState = (i) => {
    if (!answered) return selected === i ? 'selected' : null;

  if (showRanking) return <RankingScreen onBack={onBack} correct={selected === q.ans} />;

// ─── SCREEN: SPEED MODE ────────────────────────────────────────────────
function SpeedScreen({ onBack }) {
  const [phase, setPhase] = React.useState('intro');
  const [timeLeft, setTimeLeft] = React.useState(30);
  const [qIdx, setQIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [answered, setAnswered] = React.useState(false);
  const allQ = React.useMemo(() => {
    const arr = [];
    Object.values(QUESTIONS).forEach(qs => arr.push(...qs));
    return arr.sort(() => Math.random() - 0.5);
  }, []);

  React.useEffect(() => {
    if (phase !== 'playing') return;
    if (timeLeft <= 0) { setPhase('done'); return; }
    const t = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, timeLeft]);

  const handle = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i === allQ[qIdx % allQ.length].ans) setScore(s => s + 1);
    setTimeout(() => {
      setAnswered(false);
      setSelected(null);
      setQIdx(q => q + 1);
    }, 500);
  };

  if (phase === 'intro') return (
    <div style={{ background: "#0a0a0a", minHeight: "100%", padding: "16px 20px", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 40, cursor: "pointer" }} onClick={onBack}>
        <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 20 }}>←</span>
        <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Inicio</span>
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
        <div style={{ fontSize: 64, marginBottom: 16, animation: "pulse 2s infinite" }}>⚡</div>
        <div style={{ color: "#fff", fontSize: 26, fontWeight: 800, marginBottom: 8 }}>Contrarreloj</div>
        <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 15, lineHeight: 1.6, maxWidth: 260, marginBottom: 40 }}>
          Responde el máximo de preguntas posible en <strong style={{ color: "#a030e8" }}>30 segundos</strong>. Cada acierto suma 1 punto.
        </div>
        <div style={{
          background: "#151515", borderRadius: 16, padding: "14px 20px",
          marginBottom: 40, width: "100%"
        }}>
          <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 12, marginBottom: 4 }}>Tu récord actual</div>
          <div style={{ color: "#a030e8", fontSize: 32, fontWeight: 800 }}>8 preguntas</div>
        </div>
        <button
          onClick={() => setPhase('playing')}
          style={{
            width: "100%", padding: "16px", borderRadius: 14,
            background: "linear-gradient(135deg, #a030e8, #7020b8)",
            border: "none", color: "#fff", fontSize: 17, fontWeight: 700,
            cursor: "pointer", letterSpacing: "0.02em"
          }}>¡Empezar!</button>
      </div>
    </div>
  );

  if (phase === 'done') return (
    <div style={{ background: "#0a0a0a", minHeight: "100%", padding: "16px 20px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center" }}>
      <div style={{ fontSize: 56, marginBottom: 12, animation: "popIn 0.5s ease" }}>
        {score >= 8 ? "🏆" : score >= 5 ? "⭐" : "💪"}
      </div>
      <div style={{ color: "#fff", fontSize: 28, fontWeight: 800, marginBottom: 4 }}>{score} correctas</div>
      <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 14, marginBottom: 6 }}>en 30 segundos</div>
      {score >= 8 && <div style={{ color: "#e8a030", fontSize: 13, fontWeight: 600, marginBottom: 24 }}>🎉 ¡Nuevo récord personal!</div>}
      {score < 8 && <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 13, marginBottom: 24 }}>Récord: 8 • Te faltan {8 - score} para superarlo</div>}
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10,
        width: "100%", marginBottom: 30
      }}>
        {[
          { label: "Respondidas", value: qIdx % allQ.length || qIdx },
          { label: "Tasa de acierto", value: qIdx > 0 ? Math.round(score / qIdx * 100) + "%" : "—" },
        ].map(s => (
          <div key={s.label} style={{ background: "#151515", borderRadius: 14, padding: "14px 10px" }}>
            <div style={{ color: "#fff", fontSize: 22, fontWeight: 700 }}>{s.value}</div>
            <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 11, marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, width: "100%" }}>
        <button onClick={onBack} style={{
          flex: 1, padding: "14px", borderRadius: 14, background: "#1a1a1a",
          border: "none", color: "rgba(255,255,255,0.6)", fontSize: 15, fontWeight: 600, cursor: "pointer"
        }}>Inicio</button>
        <button onClick={() => { setPhase('intro'); setScore(0); setQIdx(0); setTimeLeft(30); }} style={{
          flex: 2, padding: "14px", borderRadius: 14,
          background: "linear-gradient(135deg, #a030e8, #7020b8)",
          border: "none", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer"
        }}>Otra vez</button>
      </div>
    </div>
  );

  const q = allQ[qIdx % allQ.length];
  const pct = timeLeft / 30;
  const timerColor = timeLeft > 10 ? "#a030e8" : "#e83060";

  return (
    <div style={{ background: "#0a0a0a", minHeight: "100%", padding: "16px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div style={{ color: "#fff", fontWeight: 700, fontSize: 20 }}>#{qIdx + 1}</div>
        <div style={{ textAlign: "center" }}>
          <div style={{
            color: timerColor, fontSize: 32, fontWeight: 800,
            animation: timeLeft <= 5 ? "timerPulse 0.5s infinite" : undefined
          }}>{timeLeft}s</div>
        </div>
        <div style={{ color: "#a030e8", fontWeight: 700, fontSize: 20 }}>{score} ✓</div>
      </div>

      <div style={{ height: 4, background: "#1a1a1a", borderRadius: 99, marginBottom: 24, overflow: "hidden" }}>
        <div style={{
          height: "100%", width: `${pct * 100}%`,
          background: `linear-gradient(90deg, ${timerColor}, ${timerColor}88)`,
          transition: "width 1s linear, background 0.3s"
        }} />
      </div>

      <div style={{ color: "#fff", fontSize: 18, fontWeight: 700, lineHeight: 1.35, marginBottom: 22 }}>
        {q.q}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        {q.opts.map((opt, i) => {
          let state = null;
          if (answered) {
            if (i === q.ans) state = 'correct';
            else if (i === selected) state = 'wrong';
          }
          return (
            <OptionBtn key={i} text={opt} letter={["A","B","C","D"][i]} state={state} onClick={() => handle(i)} />
          );
        })}
      </div>
    </div>
  );
}

// ─── SCREEN: LEARN ────────────────────────────────────────────────
function LearnScreen({ onBack }) {
  const [cat, setCat] = React.useState(null);
  const [qIdx, setQIdx] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [answered, setAnswered] = React.useState(false);
  const [showCtx, setShowCtx] = React.useState(false);

  const qs = cat ? QUESTIONS[cat] : [];
  const q = qs[qIdx % qs.length];

  const handle = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    if (i !== q.ans) setShowCtx(true);
  };

  const next = () => {
    setQIdx(x => x + 1);
    setSelected(null);
    setAnswered(false);
    setShowCtx(false);
  };

  if (!cat) return (
    <div style={{ background: "#0a0a0a", minHeight: "100%", padding: "16px 20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 24, cursor: "pointer" }} onClick={onBack}>
        <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 20 }}>←</span>
        <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Inicio</span>
      </div>
      <div style={{ color: "#fff", fontSize: 22, fontWeight: 800, marginBottom: 4 }}>¿Qué quieres aprender?</div>
      <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 14, marginBottom: 24 }}>Elige un tema y empieza a practicar</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {Object.keys(CAT_COLORS).map((c, i) => {
          const col = CAT_COLORS[c];
          return (
            <div
              key={c}
              onClick={() => setCat(c)}
              style={{
                background: col.bg, border: `1px solid ${col.accent}30`,
                borderRadius: 18, padding: "16px 18px",
                display: "flex", alignItems: "center", gap: 14,
                cursor: "pointer",
                animation: `slideUp ${0.1 + i * 0.07}s ease both`
              }}>
              <div style={{ fontSize: 28 }}>{CAT_ICONS[c]}</div>
              <div style={{ flex: 1 }}>
                <div style={{ color: col.text, fontSize: 16, fontWeight: 700 }}>{CAT_NAMES[c]}</div>
                <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 12, marginTop: 2 }}>{QUESTIONS[c].length} preguntas</div>
              </div>
              <div style={{ color: "rgba(255,255,255,0.2)", fontSize: 18 }}>›</div>
            </div>
          );
        })}
      </div>
    </div>
  );

  const col = CAT_COLORS[cat];
  const getState = (i) => {
    if (!answered) return selected === i ? 'selected' : null;
    if (i === q.ans) return 'correct';
    if (i === selected && selected !== q.ans) return 'wrong';
    return null;
  };

  return (
    <div style={{ background: "#0a0a0a", minHeight: "100%", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }} onClick={() => { setCat(null); next(); }}>
            <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 20 }}>←</span>
            <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Temas</span>
          </div>
          <CategoryBadge cat={cat} small />
        </div>

        <div style={{ display: "flex", gap: 3, marginBottom: 20 }}>
          {qs.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 3, borderRadius: 99,
              background: i <= qIdx % qs.length ? col.accent : "#1a1a1a",
              transition: "background 0.3s"
            }} />
          ))}
        </div>

        <div style={{ color: "#fff", fontSize: 19, fontWeight: 700, lineHeight: 1.35, marginBottom: 24 }}>
          {q.q}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
          {q.opts.map((opt, i) => (
            <OptionBtn key={i} text={opt} letter={["A","B","C","D"][i]} state={getState(i)} onClick={() => handle(i)} />
          ))}
        </div>
      </div>

      {showCtx && (
        <div style={{
          margin: "0 20px 20px", padding: "16px",
          background: "rgba(232,48,96,0.06)", borderRadius: 16,
          border: "1px solid rgba(232,48,96,0.2)",
          animation: "slideUp 0.35s ease"
        }}>
          <div style={{ color: "#e83060", fontWeight: 700, marginBottom: 6, fontSize: 13 }}>
            💡 Contexto histórico
          </div>
          <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 13, lineHeight: 1.6 }}>{q.ctx}</div>
        </div>
      )}

      {answered && (
        <div style={{ padding: "0 20px 20px" }}>
          <button onClick={next} style={{
            width: "100%", padding: "15px",
            borderRadius: 14, border: "none",
            background: selected === q.ans
              ? "linear-gradient(135deg, #2ec87a, #1a9a5c)"
              : `linear-gradient(135deg, ${col.accent}, ${col.accent}99)`,
            color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer"
          }}>
            {qIdx % qs.length === qs.length - 1 ? "🎉 ¡Tema completado!" : "Siguiente →"}
          </button>
        </div>
      )}
    </div>
  );
}

        }}>
          <span style={{ fontSize: 18 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontFamily: "Outfit", fontWeight: tab === t.id ? 600 : 400 }}>{t.label}</span>
          {tab === t.id && <div style={{ width: 4, height: 4, borderRadius: 99, background: "#fff", marginTop: -2 }} />}
        </button>
      ))}
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState(() => {
    try { return localStorage.getItem('cg_screen') || 'home'; } catch { return 'home'; }
  });

  const nav = (s) => {
    setScreen(s);
    try { localStorage.setItem('cg_screen', s); } catch {}
  };

  const screens = {
    home:  <HomeScreen onNav={nav} />,
    daily: <DailyScreen onBack={() => nav('home')} />,
    speed: <SpeedScreen onBack={() => nav('home')} />,
    learn: <LearnScreen onBack={() => nav('home')} />,
  };

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#111" }}>
      <IOSDevice dark width={393} height={852}>
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ flex: 1, overflowY: "auto" }}>
            {screens[screen] || screens.home}
          </div>
          <TabBar tab={screen} onTab={nav} />
        </div>
      </IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
